name: 記事自動生成

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日9:00 JST（UTC 0:00）
  workflow_dispatch:      # 手動実行ボタンも使える
    inputs:
      count:
        description: '生成する記事数'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージインストール
        run: pip install anthropic pytrends

      - name: キーワード自動発掘 + 記事生成（優先度付け）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # キーワードプールを確実に初期化（builtin）
          python scripts/init_keywords_pool.py

          # キーワード発掘＆プール更新（オプション・失敗許容）
          python scripts/discover_keywords.py --limit 30 --update || echo "Note: discover_keywords skipped"

          # 優先度付きで記事生成（デフォルト2記事）
          python scripts/generate_article.py --auto-discover 2

      - name: 生成した記事をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/ public/images/blog/
          git diff --staged --quiet || git commit -m "auto: ニュース記事を自動生成 $(date +'%Y-%m-%d') (${{ github.event.inputs.count || '1' }}本)"
          git push
