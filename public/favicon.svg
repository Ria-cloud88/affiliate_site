<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
    <!-- Document/Article icon -->
    <g>
        <!-- Document background -->
        <rect x="28" y="16" width="72" height="96" rx="4" fill="none" stroke="currentColor" stroke-width="3"/>

        <!-- Lines representing text -->
        <line x1="40" y1="32" x2="88" y2="32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="48" x2="88" y2="48" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="64" x2="88" y2="64" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="80" x2="70" y2="80" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <style>
        line, rect { stroke: #000; }
        @media (prefers-color-scheme: dark) {
            line, rect { stroke: #FFF; }
        }
    </style>
</svg>
